version: '3.8'

services:
  qds-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5051:5051"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - CACHE_DIR=/app/data/cache
    restart: unless-stopped